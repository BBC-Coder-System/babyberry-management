<!DOCTYPE html>
<html>
<head><title>Test</title></head>
<body>
<button onclick="switchTab('student')">New Student</button>
<button onclick="switchTab('dashboard')">Dashboard</button>
<div id="panel-student" style="display:none">Student Panel</div>
<div id="panel-dashboard" style="display:none">Dashboard Panel</div>
<script>
console.log('Script running');
function switchTab(name) {
  document.querySelectorAll('div').forEach(p => p.style.display = 'none');
  document.getElementById('panel-' + name).style.display = 'block';
}
</script>
</body>
</html>
